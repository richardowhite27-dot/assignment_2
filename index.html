<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JA Threads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4f4f4; margin: 0; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh;">

    <nav style="background: #000; padding: 20px; color: #ffb81c; text-align: center; display: flex; align-items: center; justify-content: center; gap: 15px;">
        <img src="Assets/jamaican_logo.jpg" alt="Logo" style="height: 40px; border-radius: 4px;">
        <span style="font-weight: bold; font-size: 1.8rem;">JA Threads</span>
    </nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="max-width: 400px; width: 100%; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="Assets/jamaican_logo.jpg" alt="JA Threads Logo" style="width: 80px; height: auto; margin-bottom: 10px;">
                <h2 style="color: #007749; margin: 0;">Account Login</h2>
            </div>
            
            <form id="loginForm">
                <div style="margin-bottom: 15px;">
                    <label for="loginEmail" style="display: block; margin-bottom: 5px; font-weight: bold;">Student Email:</label>
                    <input type="email" id="loginEmail" placeholder="e.g. 2103123@utech.edu.jm" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="loginPassword" style="display: block; margin-bottom: 5px; font-weight: bold;">Password:</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                </div>

                <button type="submit" style="width: 100%; background-color: #000; color: #ffb81c; padding: 14px; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 1.1rem; transition: 0.3s;">
                    SIGN IN
                </button>
            </form>
            
            <p id="loginFeedback" style="text-align: center; margin-top: 20px; font-weight: bold; min-height: 24px; font-size: 0.9rem;"></p>
            
            <div style="text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <p style="font-size: 0.95rem; color: #555;">
                    New customer? <a href="codes/registration.html" style="color: #007749; font-weight: bold; text-decoration: none;">Create an account</a>
                </p>
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px; color: #888; font-size: 0.9rem;">
        <p>&copy; 2026 Jamaican Branded Tees | Richardo White - 2103123</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
