<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | JA Threads</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

    <nav style="background: #000; padding: 20px; color: #ffb81c; text-align: center; position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="../Assets/jamaican_logo.jpg" alt="Logo" style="height: 35px; border-radius: 4px;">
            <div class="logo" style="font-size: 1.8rem; font-weight: bold;">JA Threads</div>
        </div>
        <div>
            <a href="../index.html" style="color: #ffb81c; text-decoration: none; font-weight: bold; font-size: 0.9rem;">
                ← Back to Login
            </a>
        </div>
    </nav>

    <main style="max-width: 500px; margin: 40px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <div style="text-align: center; margin-bottom: 25px;">
            <img src="../Assets/jamaican_logo.jpg" alt="Logo" style="width: 100px; height: auto; margin-bottom: 15px;">
            <h1 style="color: #000; margin: 0;">Join the Tribe</h1>
            <p style="color: #007749; font-weight: bold; margin-top: 5px;">Heritage in Every Stitch</p>
        </div>

        <h2 style="text-align: center; color: #333; margin-bottom: 20px; font-size: 1.2rem;">Create Your Account</h2>
        
        <form id="registrationForm">
            <div style="margin-bottom: 15px;">
                <label for="username" style="display: block; font-weight: 600; margin-bottom: 5px;">Full Name:</label>
                <input type="text" id="username" placeholder="Enter your full name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="email" style="display: block; font-weight: 600; margin-bottom: 5px;">Email Address:</label>
                <input type="email" id="email" placeholder="name@email.com" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="password" style="display: block; font-weight: 600; margin-bottom: 5px;">Password:</label>
                <input type="password" id="password" placeholder="Create a password" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="confirmPassword" style="display: block; font-weight: 600; margin-bottom: 5px;">Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="terms" required style="width: 18px; height: 18px; cursor: pointer;">
                <label for="terms" style="cursor: pointer;">I agree to the <span style="color: #007749; font-weight: bold;">Terms & Conditions</span></label>
            </div>

            <button type="submit" style="width: 100%; background-color: #007749; color: white; padding: 14px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 1rem; transition: 0.3s;">
                REGISTER NOW
            </button>
        </form>
        
        <p id="formFeedback" style="text-align: center; margin-top: 20px; font-weight: bold; min-height: 24px; font-size: 0.9rem;"></p>
    </main>

    <footer style="text-align: center; padding: 30px; color: #777; font-size: 0.85rem;">
        <p>&copy; 2026 Jamaican Branded Tees | Richardo White - 2103123</p>
    </footer>

    <script src="../script.js"></script>
</body>
</html>
