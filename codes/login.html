<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JA Threads</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav>
    <div class="logo">🇯🇲 JA Threads</div>
    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="products.html">Shop</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="registration.html">Register</a></li>
        <li><a href="cart.html">Cart</a></li>
    </ul>
</nav>

<link rel="stylesheet" href="../style.css">
<script src="../script.js"></script>

    <main style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
            <h2 style="text-align: center; color: var(--primary-green);">Customer Login</h2>
            
            <form id="loginForm">
                <div style="margin-bottom: 15px;">
                    <label for="loginEmail">Email Address:</label>
                    <input type="email" id="loginEmail" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label for="loginPass">Password:</label>
                    <input type="password" id="loginPass" required style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd;">
                </div>

                <button type="submit" style="width: 100%; background: var(--primary-black); color: var(--primary-gold); padding: 12px; border: none; cursor: pointer; font-weight: bold;">
                    LOG IN
                </button>
            </form>

            <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                New here? <a href="registration.html" style="color: var(--primary-green);">Create an account</a>
            </p>
            
            <p id="loginFeedback" style="text-align: center; margin-top: 10px; font-weight: bold;"></p>
        </div>
    </main>

    <footer id="main-footer">
        <p>&copy; 2026 Jamaican Branded Tees | Student ID: [Your ID]</p>
    </footer>

    <script src="../script.js"></script>
</body>
